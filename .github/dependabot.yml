version: 2

# Atualizacao automatica de dependencias. Abre PR quando sai correcao de seguranca
# ou versao nova. Agrupa o stack OpenTelemetry para o upgrade major coordenado (o M6
# do audit: @vercel/otel 2.x exige subir api-logs/sdk-logs/core juntos) cair num PR
# unico, revisavel e testavel, em vez de bumps soltos. [audit 2026-06-28]

updates:
  - package-ecosystem: "npm"
    directory: "/portal"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      opentelemetry:
        patterns:
          - "@opentelemetry/*"
          - "@vercel/otel"
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/client"
    ignore:
      # Prisma 7 e uma migracao MAJOR (url/directUrl saem do schema.prisma para um
      # prisma.config.ts + adapter no PrismaClient): esforco dedicado com teste, nao
      # bump automatico numa base de pagamento ao vivo. Mantem o Prisma 6 (estavel,
      # sem CVE). Para fazer o 7 no futuro, remova estas duas linhas.
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["ci"]
