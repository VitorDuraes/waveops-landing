name: CodeQL

# Analise estatica de seguranca (SAST) do codigo JS/TS. Grátis em repo publico.
# Acha injection, XSS, path traversal, etc. que o typecheck nao pega. Os alertas
# aparecem na aba Security > Code scanning do GitHub. [audit 2026-06-28]

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Semanal (segunda 06:00 UTC): pega regra nova do CodeQL sem precisar de commit.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # query suite com regras de seguranca estendidas.
          queries: security-extended
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
