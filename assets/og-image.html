<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    background: radial-gradient(1100px 700px at 78% -10%, rgba(139,92,246,.55), transparent 60%), linear-gradient(150deg, #0b0b12, #08080b);
    color: #fff; padding: 76px 80px; display: flex; flex-direction: column; justify-content: space-between;
    position: relative; overflow: hidden;
  }
  .dots { position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,.07) 1.4px, transparent 1.4px); background-size: 30px 30px; }
  .brand { display: flex; align-items: center; gap: 18px; position: relative; }
  .mark { width: 64px; height: 64px; border-radius: 16px; background: linear-gradient(150deg,#a78bfa,#8b5cf6); display: grid; place-items: center; }
  .mark svg { width: 38px; height: 38px; }
  .brand b { font-size: 34px; font-weight: 700; letter-spacing: -.02em; }
  .brand b span { color: #c4b5fd; }
  .eyebrow { font-family: 'Space Mono', monospace; font-size: 19px; letter-spacing: .22em; text-transform: uppercase; color: #c4b5fd; position: relative; }
  h1 { font-size: 82px; line-height: 1.02; font-weight: 700; letter-spacing: -.03em; max-width: 1000px; position: relative; }
  h1 span { color: #a78bfa; }
  .foot { display: flex; align-items: center; justify-content: space-between; position: relative; }
  .foot p { font-size: 26px; color: #b9b9c6; max-width: 720px; line-height: 1.35; }
  .url { font-family: 'Space Mono', monospace; font-size: 22px; color: #8b5cf6; font-weight: 700; }
</style>
</head>
<body>
  <div class="dots"></div>
  <div class="brand">
    <span class="mark"><svg viewBox="0 0 48 48" fill="none"><path d="M7 30 Q 15 15 24 23 Q 31 30 34 18.6" stroke="#fff" stroke-width="3.6" stroke-linecap="round"/><circle cx="7" cy="30" r="3.5" fill="#fff"/><path fill-rule="evenodd" fill="#fff" d="M34 18 a6 6 0 1 1 12 0 a6 6 0 1 1 -12 0 Z M37.6 18 a2.4 2.4 0 1 0 4.8 0 a2.4 2.4 0 1 0 -4.8 0 Z"/></svg></span>
    <b>Wave<span>Ops</span></b>
  </div>
  <div>
    <div class="eyebrow">Automação · Desenvolvimento · IA</div>
    <h1 style="margin-top:22px">Coloque sua operação <span>no automático.</span></h1>
  </div>
  <div class="foot">
    <p>Automação, sistemas e IA para tirar o trabalho manual da sua operação.</p>
    <span class="url">waveops.com.br</span>
  </div>
</body>
</html>
