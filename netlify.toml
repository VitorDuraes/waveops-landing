# waveops.com.br = LANDING ESTATICA. O portal (checkout, /cliente, /admin, /api,
# /termos, /privacidade) vive em portal.waveops.com.br (Railway), com banco e
# Mercado Pago unicos. Aqui NAO se roda o Next: publicamos so a landing.
#
# Decisao 2026-06-27: consolidar tudo no Railway. Antes, Netlify e Railway rodavam
# o portal EM PARALELO, com bancos diferentes: o cliente assinava em waveops.com.br
# (banco do Netlify) e o webhook do MP batia em portal.waveops.com.br (banco do
# Railway), entao a fatura nunca baixava. Agora ha UM portal e UM banco.

[build]
  # Monta um site estatico so com a landing (nao serve o codigo-fonte do repo).
  command = "rm -rf _site && mkdir -p _site && cp index.html robots.txt sitemap.xml _site/ && cp -r assets _site/"
  publish = "_site"

# Rede de seguranca: qualquer rota de portal que caia aqui (bookmark antigo, link
# indexado, URL digitada) salta pro Railway, pra nunca existir um 2o portal/banco
# em waveops.com.br. Os botoes da landing ja apontam direto pro portal (absolutos).
[[redirects]]
  from = "/cliente/*"
  to = "https://portal.waveops.com.br/cliente/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/admin/*"
  to = "https://portal.waveops.com.br/admin/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/checkout"
  to = "https://portal.waveops.com.br/checkout"
  status = 301
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://portal.waveops.com.br/api/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/termos"
  to = "https://portal.waveops.com.br/termos"
  status = 301
  force = true

[[redirects]]
  from = "/privacidade"
  to = "https://portal.waveops.com.br/privacidade"
  status = 301
  force = true
